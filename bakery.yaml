#######################################################################################################################
# BAKERY REPOSITORY CONFIG
#
# This file is used to define global properties for builds inside a repo managed by Posit's Bakery tool.
#######################################################################################################################

# Define properties of the local repository. This information will be used when labeling image builds.
repository:
  url: "github.com/posit-dev/images-connect"
  vendor: "Posit Software, PBC"
  maintainer: "Posit Docker Team <docker@posit.co>"
  authors:
    - name: Ben Schwedler
      email: ben@posit.co
    - name: Ian H. Pittwood
      email: ian.pittwood@posit.co

# Define image registries used by builds in this repository. Images will be tagged appropriately for each registry.
# Logins for private registries should be managed independently of Bakery.
registries:
  - host: "docker.io"
    namespace: "posit"
  - host: "ghcr.io"
    namespace: "posit-dev"

images:
  - name: connect
    displayName: "Posit Connect"
    description: "A containerized image of Posit Connect (PCT), which organizes and
      centralizes data science packages across your team, department, or the entire
      organization."
    documentationUrl: https://docs.posit.co/connect/
    variants:
      - name: Standard
        extension: std
        tagDisplayName: std
        primary: true
        options:
          - tool: goss
            wait: 10
            command: "/opt/rstudio-connect/bin/connect --config /etc/rstudio-connect/rstudio-connect.gcfg"
            runtimeOptions: "--privileged"
      - name: Minimal
        extension: min
        tagDisplayName: min
    versions:
      - name: 2025.07.0
        subpath: '2025.07'
        latest: true
        os:
          - name: Ubuntu 22.04
            primary: true
      - name: 2025.06.0
        subpath: '2025.06'
        os:
          - name: Ubuntu 22.04
            primary: true
      - name: 2025.05.0
        subpath: '2025.05'
        os:
          - name: Ubuntu 22.04
            primary: true
      - name: 2025.04.0
        subpath: '2025.04'
        os:
          - name: Ubuntu 22.04
            primary: true
      - name: 2025.03.0
        subpath: '2025.03'
        os:
          - name: Ubuntu 22.04
            primary: true
      - name: 2025.02.0
        subpath: '2025.02'
        os:
          - name: Ubuntu 22.04
            primary: true
      - name: 2025.01.0
        subpath: '2025.01'
