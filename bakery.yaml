#######################################################################################################################
# BAKERY REPOSITORY CONFIG
#
# This file is used to define global properties for builds inside a repo managed by Posit's Bakery tool.
#######################################################################################################################

# Define properties of the local repository. This information will be used when labeling image builds.
repository:
  url: "github.com/posit-dev/images-connect"
  vendor: "Posit Software, PBC"
  maintainer: "Posit Docker Team <docker@posit.co>"
  authors:
    - name: Ben Schwedler
      email: ben@posit.co
    - name: Ian H. Pittwood
      email: ian.pittwood@posit.co

# Define image registries used by builds in this repository. Images will be tagged appropriately for each registry.
# Logins for private registries should be managed independently of Bakery.
registries:
  - host: "docker.io"
    namespace: "posit"
  - host: "ghcr.io"
    namespace: "posit-dev"

images:
  - name: connect
    displayName: "Posit Connect"
    description: "A containerized image of Posit Connect (PCT), which organizes and
      centralizes data science packages across your team, department, or the entire
      organization."
    dependencyConstraints:
      - dependency: R
        constraint:
          latest: true
      - dependency: python
        constraint:
          latest: true
      - dependency: quarto
        constraint:
          latest: true
    documentationUrl: https://docs.posit.co/connect/
    variants:
      - name: Standard
        extension: std
        tagDisplayName: std
        primary: true
        options:
          - tool: goss
            wait: 20
            command: "/opt/rstudio-connect/bin/connect --config /etc/rstudio-connect/rstudio-connect.gcfg"
            runtimeOptions: "--privileged"
      - name: Minimal
        extension: min
        tagDisplayName: min
        options:
          - tool: goss
            runtimeOptions: "--privileged"
    devVersions:
      - sourceType: stream
        product: connect
        stream: daily
        os:
          - name: Ubuntu 24.04
            primary: true
          - name: Ubuntu 22.04
        overrideRegistries:
          - host: "ghcr.io"
            namespace: "posit-dev"
            repository: "connect-preview"
    versions:
      - name: 2026.01.1
        subpath: '2026.01'
        latest: true
        os:
          - name: Ubuntu 24.04
            primary: true
          - name: Ubuntu 22.04
        dependencies:
          - dependency: R
            version: 4.5.2
          - dependency: python
            version: 3.14.2
          - dependency: quarto
            version: 1.8.27
      - name: 2025.12.1
        subpath: '2025.12'
        os:
          - name: Ubuntu 24.04
            primary: true
          - name: Ubuntu 22.04
        dependencies:
          - dependency: R
            version: 4.5.2
          - dependency: python
            version: 3.14.2
          - dependency: quarto
            version: 1.8.26
      - name: 2025.11.0
        subpath: '2025.11'
        os:
          - name: Ubuntu 22.04
            primary: true
        dependencies:
          - dependency: R
            version: 4.5.2
          - dependency: python
            version: 3.14.2
          - dependency: quarto
            version: 1.8.26
      - name: 2025.10.0
        subpath: '2025.10'
        os:
          - name: Ubuntu 22.04
            primary: true
        dependencies:
          - dependency: R
            version: 4.5.1
          - dependency: python
            version: 3.14.0
          - dependency: quarto
            version: 1.8.25
      - name: 2025.09.1
        subpath: '2025.09'
        os:
          - name: Ubuntu 22.04
            primary: true
        dependencies:
          - dependency: R
            version: 4.5.1
          - dependency: python
            version: 3.13.7
          - dependency: quarto
            version: 1.8.25
      - name: 2025.07.0
        subpath: '2025.07'
        os:
          - name: Ubuntu 22.04
            primary: true
        dependencies:
          - dependency: R
            version: 4.4.0
          - dependency: python
            version: 3.12.1
          - dependency: quarto
            version: 1.4.557
      - name: 2025.06.0
        subpath: '2025.06'
        os:
          - name: Ubuntu 22.04
            primary: true
        dependencies:
          - dependency: R
            version: 4.4.0
          - dependency: python
            version: 3.12.1
          - dependency: quarto
            version: 1.4.557
      - name: 2025.05.0
        subpath: '2025.05'
        os:
          - name: Ubuntu 22.04
            primary: true
